version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: resume_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: resume_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.12
    container_name: resume_neo4j
    restart: always
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7
    container_name: resume_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: resume_backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=postgres
      - NEO4J_URI=bolt://neo4j:7687
    depends_on:
      - postgres
      - neo4j
      - redis

  frontend:
    image: node:22-slim
    container_name: resume_frontend
    working_dir: /app
    volumes:
      - ../frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  postgres_data:
  neo4j_data:
